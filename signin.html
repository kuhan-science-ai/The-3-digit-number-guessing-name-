<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Number Guessing Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="signin-shell">
    <section class="signin-card">
      <p class="kicker">Player Access</p>
      <h1>Sign in before you enter the puzzle room.</h1>
      <p id="authStatus" class="lead auth-lead">Use your Google account to unlock the number guessing game.</p>
      <div class="signin-actions">
        <button id="googleSignInBtn" class="primary-btn" type="button">Continue with Google</button>
      </div>
      <p class="signin-note">After sign-in, you will be sent directly to the game board.</p>
    </section>
  </main>

  <script type="module" src="./auth.js?v=20260421-1"></script>
</body>
</html>
